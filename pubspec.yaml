name: wallet_ai
description: WalletAI - Tu asistente financiero inteligente con IA
publish_to: 'none'
version: 1.1.2+4

environment:
  sdk: '>=3.10.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter
  
  # Estado
  flutter_riverpod: ^2.6.1
  
  # Base de datos
  drift: ^2.23.0
  sqlite3_flutter_libs: ^0.5.24
  path_provider: ^2.1.5
  path: ^1.9.0
  
  # Encriptación
  sqflite_sqlcipher: ^3.1.1
  encrypt: ^5.0.3
  crypto: ^3.0.7
  
  # IA
  google_mlkit_text_recognition: ^0.13.0
  image_picker: ^1.1.2
  google_generative_ai: ^0.4.6
  http: ^1.6.0

  # Sincronización
  googleapis: ^13.2.0
  googleapis_auth: ^1.6.0
  google_sign_in: ^6.2.2

  # Actualizaciones (OTA)
  dio: ^5.7.0
  package_info_plus: ^8.2.0
  open_filex: ^4.5.0
  
  # Permisos
  permission_handler: ^11.3.1
  
  # Notificaciones
  flutter_local_notifications: ^18.0.1
  timezone: ^0.9.4
  flutter_timezone: ^5.0.1
  flutter_localizations:
    sdk: flutter
  intl: ^0.20.1
  
  # Exportación
  csv: ^6.0.0
  
  # UI
  fl_chart: ^0.70.1
  google_fonts: ^6.2.1
  
  # Utilidades
  uuid: ^4.5.1
  collection: ^1.19.1
  
  # Navegación
  go_router: ^14.6.2
  
  # Home Screen Widgets
  home_widget: ^0.7.0
  
  # Persistencia de Preferencias
  shared_preferences: ^2.5.4
  
  # Otros
  share_plus: ^10.1.2
  url_launcher: ^6.3.1
  file_picker: ^10.3.10
  excel: ^4.0.6
  sqlite3: ^2.9.4
  speech_to_text: ^7.3.0
  
  # PDF
  pdf: ^3.11.3
  printing: ^5.14.2
  
  # GPS / Ubicación
  geolocator: ^13.0.2
  geocoding: ^3.0.0
  workmanager: ^0.9.0+3
  showcaseview: ^5.0.1
  flutter_map: ^8.2.2
  latlong2: ^0.9.1
  cached_network_image: ^3.4.1
  logger: ^2.7.0

dev_dependencies:
  flutter_test:
    sdk: flutter
  
  # Generación de código
  build_runner: ^2.4.13
  drift_dev: ^2.23.0
  
  # Linting
  flutter_lints: ^5.0.0
  
  # Testing
  mockito: ^5.4.4
  
  # App Icon
  flutter_launcher_icons: ^0.14.3
  flutter_native_splash: ^2.4.0

flutter:
  generate: true
  uses-material-design: true
  
  assets:
    - assets/images/
    - assets/data/

flutter_launcher_icons:
  android: true
  ios: false
  image_path: "assets/images/app_icon.png"
  min_sdk_android: 21
  web:
    generate: false

flutter_native_splash:
  color: "#FFFFFF"
  image: "assets/images/app_icon.png"
  branding: "assets/images/app_icon.png"
  color_dark: "#060E20"
  image_dark: "assets/images/app_icon.png"
  branding_dark: "assets/images/app_icon.png"

  android_12:
    image: "assets/images/app_icon.png"
    icon_background_color: "#FFFFFF"
    icon_background_color_dark: "#060E20"

