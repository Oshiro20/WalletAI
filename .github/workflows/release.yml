name: Release

on:
  push:
    tags:
      - 'v*.*.*'

jobs:
  release:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4

      - name: Extract version from tag
        id: version
        run: echo "VERSION=${GITHUB_REF#refs/tags/}" >> $GITHUB_OUTPUT

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ steps.version.outputs.VERSION }}
          name: "WalletAI ${{ steps.version.outputs.VERSION }}"
          body: |
            ## WalletAI ${{ steps.version.outputs.VERSION }}
            
            Nueva versión disponible. Actualiza para obtener las últimas mejoras.
            
            > MyLifeOS detectará esta versión automáticamente y te notificará.
          draft: false
          prerelease: false
